<!DOCTYPE html>
<html lang="en">

</head>
<body>
   <script>
    function sum(a,b){         // HERE A AND  B ARE PARAMETRS
        let sum = a+b;
        return sum;
    }
    console.log(sum(4,5));                     // HERE A,B ARE ARGUEMENTS AS THEY ARE CALLING.
     console.log(sum(0,0));
      console.log(sum(1,-1));
       console.log(sum(2,3.4));
        console.log(sum(11,21));
   </script> 
</body>
</html>
