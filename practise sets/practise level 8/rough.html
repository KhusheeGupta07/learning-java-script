<body>
   <button id="firstbtn" onclick="evenOddcolour()">click - me</button>
<h2 id="btn"></h2>
   <script>
        let clck = 0;

function evenOddcolour(){

  clck++;

  let button = document.querySelector('#firstbtn');
  let text = document.querySelector('#btn');

  text.innerText = `button is clicked ${clck} times`;

  if(clck % 2 === 0){
    button.classList.remove('odd');
    button.classList.add('even');
  }
  else{
    button.classList.remove('even');
    button.classList.add('odd');
  }
}

document.querySelector('#btn').innerText = `button is clicked ${clck} times`;
