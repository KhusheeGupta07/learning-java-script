<body>
    <h2 id="greeting"></h2>

<script>
        let myDate = new Date();
        let time = myDate.getHours();
        // let name = radha;
        let greet;
console.log(myDate.getHours());
          if(time<12){
          greet = 'good morning'; }
          else if(time>=12 && time<19 ){
         greet = 'good evening';}
          else{
         greet = 'good night'; }

 console.log(greet);

function dogreeting(name = 'dear' ){
document.querySelector('#greeting').innerText = `${greet}   ${name}`;}
dogreeting('radhe');

 </script>
</body>
