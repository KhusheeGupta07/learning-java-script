<!DOCTYPE html>
<html lang="en">
<head><style>
    #aaa { border: 3px solid black;
    height: 300px; width: 200px;}

#finale {margin: 15px;   padding: 3px; width: 85%; height:40px;}

    .bbb {  display: flex; flex-wrap: wrap; margin: 4px;
    justify-content: center;}

     .btn {  border: 2px solid rgb(89, 84, 84);
     width: 60px; height: 30px;  margin: 2px;     }
</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
</head>
<body>
    <div id="aaa">
<input type="text" id="finale" readonly>

<div class="bbb">
<button class="btn"  onclick="currentdisplay = '' 
 document.querySelector('#finale').value = currentdisplay;" >C</button>
<button class="btn"   onclick="currentdisplay += 1;
 document.querySelector('#finale').value = currentdisplay;">1</button>
<button class="btn"  onclick="currentdisplay += 2;
 document.querySelector('#finale').value = currentdisplay;">2</button>
<button class="btn"   onclick="currentdisplay += '+'
 document.querySelector('#finale').value = currentdisplay;">+</button>
<button class="btn"   onclick="currentdisplay +=3 ;
 document.querySelector('#finale').value = currentdisplay;">3</button>
<button class="btn"    onclick="currentdisplay += 4;
 document.querySelector('#finale').value = currentdisplay;">4</button>
<button class="btn"    onclick="currentdisplay += '-'
 document.querySelector('#finale').value = currentdisplay;">-</button>
<button class="btn"    onclick="currentdisplay += 5;
 document.querySelector('#finale').value = currentdisplay;">5</button>
<button class="btn"    onclick="currentdisplay += 6;
 document.querySelector('#finale').value = currentdisplay;">6</button>
<button class="btn"   onclick="currentdisplay += '*'
 document.querySelector('#finale').value = currentdisplay;" >*</button>
<button class="btn"   onclick="currentdisplay += 7;
 document.querySelector('#finale').value = currentdisplay;">7</button>
<button class="btn"    onclick="currentdisplay += 8;
 document.querySelector('#finale').value = currentdisplay;">8</button>
<button class="btn"   onclick="currentdisplay += '/'
 document.querySelector('#finale').value = currentdisplay;">/</button>
<button class="btn"   onclick="
let result = eval(currentdisplay);
currentdisplay = result;
 document.querySelector('#finale').value = currentdisplay;">=</button>
<button class="btn"   onclick="currentdisplay += 9;
 document.querySelector('#finale').value = currentdisplay;">9</button>
<button class="btn"   onclick="currentdisplay += 0;
 document.querySelector('#finale').value = currentdisplay;">0</button>
<button class="btn"  onclick="currentdisplay += '.'
 document.querySelector('#finale').value = currentdisplay;">.</button>
    </div>

  <script>
    let currentdisplay = '';
    document.querySelector('#finale').value = currentdisplay;
  
  </script>  
</body>
</html>
